name: SEO Approval Actions

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "draft, commit, or publish"
        required: true
        default: "draft"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  approval-action:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run guarded approval action
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SEO_ENGINE_AUTO_PUBLISH: ${{ vars.SEO_ENGINE_AUTO_PUBLISH }}
        run: node seo-engine/scripts/run-seo-engine.mjs --mode "${{ inputs.mode }}"
