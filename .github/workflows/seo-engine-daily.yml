name: Daily SEO Growth Report

on:
  schedule:
    # 15:00 Beijing time = 07:00 UTC.
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  daily-seo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate daily SEO growth report
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run seo:daily

      - name: Upload SEO reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-seo-growth-report
          path: seo-engine/reports/daily/
