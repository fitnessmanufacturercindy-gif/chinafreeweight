name: Website Quality Gate

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      preview_url:
        description: "Public Vercel Preview URL to verify"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build production site
        env:
          NEXT_PUBLIC_SITE_URL: https://www.chinafreeweight.com
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Verify public multilingual Preview HTML
        if: github.event_name == 'workflow_dispatch' && inputs.preview_url != ''
        env:
          BASE_URL: ${{ inputs.preview_url }}
        run: node tests/i18n/commercial-completion-browser-smoke.mjs

      - name: Start production preview
        run: npm run start -- --port 3000 > /tmp/quality-gate-next.log 2>&1 &

      - name: Wait for site
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/quality-gate-next.log
          exit 1

      - name: Run website quality gate
        env:
          QUALITY_GATE_BASE_URL: http://127.0.0.1:3000
          QUALITY_GATE_PUBLIC_URL: https://www.chinafreeweight.com
          QUALITY_GATE_LIGHTHOUSE_RUNS: "3"
          QUALITY_GATE_MIN_PERFORMANCE: "90"
          QUALITY_GATE_MIN_SEO: "100"
          QUALITY_GATE_MAX_LCP_MS: "2500"
          QUALITY_GATE_MAX_CLS: "0.1"
          QUALITY_GATE_MAX_TBT_MS: "300"
          INDEXNOW_KEY: d787e9478e6f40c6f5b2e42327a8f7ab
        run: npm run quality:gate

      - name: Run daily site health assertions
        env:
          SITE_HEALTH_BASE_URL: http://127.0.0.1:3000
          SITE_HEALTH_PUBLIC_URL: https://www.chinafreeweight.com
        run: |
          npm run site:health
          npm run test:site-health
      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-quality-gate-report
          path: reports/quality-gate/

      - name: Notify search engines after main deployment checks
        if: github.ref == 'refs/heads/main'
        env:
          SEO_SUBMIT_SITE_URL: https://www.chinafreeweight.com
          INDEXNOW_KEY: d787e9478e6f40c6f5b2e42327a8f7ab
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          BING_WEBMASTER_API_KEY: ${{ secrets.BING_WEBMASTER_API_KEY }}
          YANDEX_WEBMASTER_TOKEN: ${{ secrets.YANDEX_WEBMASTER_TOKEN }}
        run: npm run seo:submit

      - name: Upload search submission reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: search-submission-report
          path: reports/search-submissions/
